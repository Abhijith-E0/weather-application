<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Weather App</h1>

    <div class="search-box">
        <input 
        type="text" 
        id="cityInput" 
        placeholder="Enter city name">

        <button onclick="getWeather()">
            Search
        </button>
    </div>


    <div class="weather-card">

        <h2 id="city">
            City Name
        </h2>

        <img id="icon" src="" alt="weather">

        <h1 id="temperature">
            -- °C
        </h1>

        <p id="condition">
            Weather condition
        </p>


        <div class="details">

            <div>
                <h3>Humidity</h3>
                <p id="humidity">
                    -- %
                </p>
            </div>


            <div>
                <h3>Wind</h3>
                <p id="wind">
                    -- km/h
                </p>
            </div>

        </div>


    </div>


</div>


<script src="./script.js"></script>

</body>
</html>
